<!DOCTYPE html>
<html lang="en" class="h-full bg-[#000000]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentation (Audience View)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="/favicon.ico" />
</head>
<body class="h-full overflow-hidden bg-[#000000] text-white font-sans selection:bg-indigo-500/30 selection:text-white select-none">
  
  <!-- Main Presentation Container -->
  <div class="reveal">
    <div class="slides">
      
      <!-- Slide 1 -->
      <section data-slide="1">
        <div class="slide-canvas">
          <img src="/assets/1.png" class="slide-bg absolute inset-0 w-full h-full object-contain z-0 gsap-scale-in" alt="Slide 1" loading="lazy" onerror="this.style.display='none'">
        </div>
      </section>

      <!-- Slide 2 -->
      <section data-slide="2" data-audio="/assets/Sounds/Slide 02 Audio.mp3">
        <div class="slide-canvas">
          <img data-src="/assets/2.png" class="slide-bg absolute inset-0 w-full h-full object-contain z-0 gsap-scale-in" alt="Slide 2" loading="lazy" onerror="this.style.display='none'">
        </div>
      </section>

      <!-- Slide 3 -->
      <section data-slide="3" data-audio="/assets/Sounds/Slide 03 Audio.mp3">
        <div class="slide-canvas">
          <img data-src="/assets/3.png" class="slide-bg absolute inset-0 w-full h-full object-contain z-0 gsap-scale-in" alt="Slide 3" loading="lazy" onerror="this.style.display='none'">
        </div>
      </section>

      <!-- Slide 4 -->
      <section data-slide="4">
        <div class="slide-canvas">
          <img data-src="/assets/4.png" class="slide-bg absolute inset-0 w-full h-full object-contain z-0 gsap-scale-in" alt="Slide 4" loading="lazy" onerror="this.style.display='none'">
        </div>
      </section>

      <!-- Slide 5 -->
      <section data-slide="5">
        <div class="slide-canvas">
          <img data-src="/assets/5.png" class="slide-bg absolute inset-0 w-full h-full object-contain z-0 gsap-scale-in" alt="Slide 5" loading="lazy" onerror="this.style.display='none'">
        </div>
      </section>

      <!-- Slide 6 -->
      <section data-slide="6" data-audio="/assets/Sounds/Slide 06 Audio.mp3">
        <div class="slide-canvas">
          <video data-src="/assets/6.mp4" class="slide-bg absolute inset-0 w-full h-full object-contain z-0 gsap-scale-in" loop muted playsinline preload="none" onerror="this.style.display='none'"></video>
        </div>
      </section>

      <!-- Slide 7 -->
      <section data-slide="7">
        <div class="slide-canvas">
          <img data-src="/assets/7.png" class="slide-bg absolute inset-0 w-full h-full object-contain z-0 gsap-scale-in" alt="Slide 7" loading="lazy" onerror="this.style.display='none'">
        </div>
      </section>

      <!-- Slide 8 -->
      <section data-slide="8">
        <div class="slide-canvas">
          <img data-src="/assets/new_slide_8.png" class="slide-bg absolute inset-0 w-full h-full object-contain z-0 gsap-scale-in" alt="Slide 8" loading="lazy" onerror="this.style.display='none'">
        </div>
      </section>

      <!-- Slide 9 -->
      <section data-slide="9">
        <div class="slide-canvas">
          <img data-src="/assets/updated_8.png" class="slide-bg absolute inset-0 w-full h-full object-contain z-0 gsap-scale-in" alt="Slide 9" loading="lazy" onerror="this.style.display='none'">
        </div>
      </section>

      <!-- Slide 10 -->
      <section data-slide="10">
        <div class="slide-canvas">
          <img data-src="/assets/new_slide_10.png" class="slide-bg absolute inset-0 w-full h-full object-contain z-0 gsap-scale-in" alt="Slide 10" loading="lazy" onerror="this.style.display='none'">
        </div>
      </section>

      <!-- Slide 11 -->
      <section data-slide="11">
        <div class="slide-canvas">
          <img data-src="/assets/10.png" class="slide-bg absolute inset-0 w-full h-full object-contain z-0 gsap-scale-in" alt="Slide 11" loading="lazy" onerror="this.style.display='none'">
        </div>
      </section>

      <!-- Slide 12 -->
      <section data-slide="12">
        <div class="slide-canvas">
          <video class="slide-bg absolute inset-0 w-full h-full object-contain z-0 gsap-scale-in" loop muted playsinline preload="none" onerror="this.style.display='none'">
            <source data-src="/assets/Slide 12 Video.mp4" type="video/mp4">
          </video>
        </div>
      </section>

      <!-- Slide 13 -->
      <section data-slide="13">
        <div class="slide-canvas">
          <img data-src="/assets/12.png" class="slide-bg absolute inset-0 w-full h-full object-contain z-0 gsap-scale-in" alt="Slide 13" loading="lazy" onerror="this.style.display='none'">
        </div>
      </section>

      <!-- Slide 14 -->
      <section data-slide="14">
        <div class="slide-canvas">
          <img data-src="/assets/13.png" class="slide-bg absolute inset-0 w-full h-full object-contain z-0 gsap-scale-in" alt="Slide 14" loading="lazy" onerror="this.style.display='none'">
        </div>
      </section>

      <!-- Slide 15 -->
      <section data-slide="15">
        <div class="slide-canvas">
          <video data-src="/assets/15.mp4" class="slide-bg absolute inset-0 w-full h-full object-contain z-0 gsap-scale-in" loop muted playsinline preload="none" onerror="this.style.display='none'"></video>
        </div>
      </section>

    </div>
  </div>

  <script type="module" src="/display.js"></script>
</body>
</html>
